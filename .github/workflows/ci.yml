name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - name: Enforce tracked artifact policy
        working-directory: .
        run: |
          set -euo pipefail
          forbidden=$(git ls-files | grep -E '(^|/)src/(node_modules|dist)/' || true)
          if [[ -n "${forbidden}" ]]; then
            echo "Forbidden tracked artifacts detected in repository index:"
            echo "${forbidden}"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint

  trigger-platform-infra-build:
    name: Trigger Platform Infra Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Dispatch build-push in platform-infra
        env:
          DISPATCH_TOKEN: ${{ secrets.PLATFORM_INFRA_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${DISPATCH_TOKEN}" ]]; then
            echo "PLATFORM_INFRA_DISPATCH_TOKEN is required to trigger platform-infra workflow."
            exit 1
          fi

          STATUS_CODE=$(curl -sS -o /tmp/dispatch_response.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/AxiomNode/platform-infra/actions/workflows/build-push.yaml/dispatches \
            -d '{"ref":"main","inputs":{"service":"bff-mobile"}}')

          if [[ "${STATUS_CODE}" != "204" ]]; then
            echo "Failed to dispatch platform-infra workflow (HTTP ${STATUS_CODE})."
            cat /tmp/dispatch_response.json
            exit 1
          fi

          echo "Dispatched platform-infra Build & Push for bff-mobile."
