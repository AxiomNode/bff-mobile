name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

# Workflow-level permissions stay read-only: this pipeline checks out source,
# reads shared dependencies, uploads coverage, and triggers cross-repo dispatch
# through an explicit token instead of broadening GITHUB_TOKEN privileges.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: bff-mobile

      - name: Validate cross-repo token
        run: |
          if [[ -z "${{ secrets.CROSS_REPO_READ_TOKEN }}" ]]; then
            echo "CROSS_REPO_READ_TOKEN is required to checkout AxiomNode/shared-sdk-client in CI."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          repository: AxiomNode/shared-sdk-client
          path: shared-sdk-client
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}

      - name: Enforce tracked artifact policy
        working-directory: bff-mobile
        run: |
          set -euo pipefail
          forbidden=$(git ls-files | grep -E '(^|/)src/(node_modules|dist)/' || true)
          if [[ -n "${forbidden}" ]]; then
            echo "Forbidden tracked artifacts detected in repository index:"
            echo "${forbidden}"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bff-mobile/src/package-lock.json
      - name: Build shared SDK package
        working-directory: shared-sdk-client/typescript
        run: |
          npm ci
          npx tsc -p tsconfig.json
      - run: npm ci
        working-directory: bff-mobile/src
      - run: npm run build
        working-directory: bff-mobile/src
      - run: npm run test:coverage
        working-directory: bff-mobile/src
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: bff-mobile/src/coverage/lcov.info
          flags: bff-mobile
          fail_ci_if_error: false
      - run: npm run lint
        working-directory: bff-mobile/src
      - run: npm audit --omit=dev --audit-level=high
        working-directory: bff-mobile/src

  trigger-platform-infra-build:
    name: Trigger Platform Infra Build
    runs-on: ubuntu-latest
    needs:
      - build-test-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect runtime-relevant changes
        id: dispatch_scope
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          if [[ -n "${BASE_SHA}" && "${BASE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            CHANGED=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          fi

          NON_DOC=$(printf '%s\n' "${CHANGED}" | grep -Ev '^(docs/|\.github/|README\.md$|AGENTS\.md$|LICENSE$|CONTRIBUTING\.md$)|\.md$' || true)
          if [[ -z "${NON_DOC}" ]]; then
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only change detected; skipping platform-infra dispatch."
          else
            echo "should_dispatch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve platform-infra dispatch auth mode
        if: steps.dispatch_scope.outputs.should_dispatch == 'true'
        id: dispatch_auth
        env:
          APP_CLIENT_ID: ${{ vars['PLATFORM_INFRA_DISPATCH_APP_CLIENT_ID'] }}
          APP_PRIVATE_KEY: ${{ secrets['PLATFORM_INFRA_DISPATCH_APP_PRIVATE_KEY'] }}
        run: |
          if [[ -n "${APP_CLIENT_ID}" && -n "${APP_PRIVATE_KEY}" ]]; then
            echo "use_app_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_app_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create platform-infra dispatch token from GitHub App
        if: steps.dispatch_auth.outputs.use_app_token == 'true'
        id: platform_infra_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars['PLATFORM_INFRA_DISPATCH_APP_CLIENT_ID'] }}
          private-key: ${{ secrets['PLATFORM_INFRA_DISPATCH_APP_PRIVATE_KEY'] }}
          owner: AxiomNode
          repositories: |
            platform-infra
          permission-actions: write

      - name: Dispatch build-push in platform-infra
        if: steps.dispatch_scope.outputs.should_dispatch == 'true'
        env:
          APP_DISPATCH_TOKEN: ${{ steps.platform_infra_app_token.outputs.token }}
          PAT_DISPATCH_TOKEN: ${{ secrets.PLATFORM_INFRA_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          DISPATCH_TOKEN="${APP_DISPATCH_TOKEN:-${PAT_DISPATCH_TOKEN:-}}"

          if [[ -z "${DISPATCH_TOKEN}" ]]; then
            echo "Either GitHub App dispatch credentials or PLATFORM_INFRA_DISPATCH_TOKEN is required to trigger platform-infra workflow."
            exit 1
          fi

          STATUS_CODE=$(curl -sS -o /tmp/dispatch_response.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/AxiomNode/platform-infra/actions/workflows/build-push.yaml/dispatches \
            -d '{"ref":"main","inputs":{"service":"bff-mobile"}}')

          if [[ "${STATUS_CODE}" != "204" ]]; then
            echo "Failed to dispatch platform-infra workflow (HTTP ${STATUS_CODE})."
            cat /tmp/dispatch_response.json
            exit 1
          fi

          echo "Dispatched platform-infra Build & Push for bff-mobile."

      - name: Skip platform-infra dispatch for docs-only changes
        if: steps.dispatch_scope.outputs.should_dispatch != 'true'
        run: echo "Skipping platform-infra dispatch because this push only changed documentation or workflow files."
